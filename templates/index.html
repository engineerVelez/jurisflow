<!DOCTYPE html>
<html>
<head>
    <title>JurisFlow</title>

    <style>
        body {
            background-color: #75c0e6;
            color: #202020;
            font-family: Arial;
        }

        .panel {
            background:white;
            padding:10px;
            border-radius:8px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
        }

        /* 🔥 INPUT + BOTÓN */
        .campo {
            display:flex;
            align-items:center;
            gap:5px;
            margin-bottom:8px;
        }

        .campo input {
            flex:1;
            padding:6px;
            border:1px solid #D0D0D0;
            border-radius:4px;
        }

        .btn-rojo {
            width:20px;
            height:20px;
            background:#8B0000;
            border:none;
            cursor:pointer;
        }

    </style>
</head>

<h1>JurisFlow 🔥</h1>

<button onclick="abrirConfig()">⚙ Configuración IA</button>

<form id="form">

</form>

    <!-- IZQUIERDA -->
    <div style="width:65%;" class="panel">
        <h3>Documento</h3>


        <div id="editor"
            contenteditable="true"
            style="
                border:1px solid #ddd;
                padding:15px;
                height:400px;
                overflow-y:scroll;
                white-space: pre-wrap;
                font-family: monospace;
                background:white;
            ">
        </div>
    <div style="
        margin-top:10px;
        display:flex;
        justify-content:space-between;
        align-items:center;
    ">

        <button onclick="generarDocumento()" 
        style="
            background:green;
            color:white;
            padding:10px;
            border:none;
            border-radius:5px;
        ">
            🟢 Generar Documento
        </button>

    </div>

</div>

<div id="configPanel" style="
